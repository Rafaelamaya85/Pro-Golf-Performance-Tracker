<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Heat Index</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 20px;
      color: #111827;
    }

    .page-wrapper {
      display: flex;
      gap: 20px;
    }

    .side-nav {
      width: 180px;
      background-color: #111827;
      padding: 15px;
      border-radius: 12px;
    }

    .side-nav a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #1f2937;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
    }

    .main-content { flex: 1; }

    h1, h2 { text-align: center; }

    .carousel-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .carousel-container img {
      max-width: 400px;
      border-radius: 12px;
    }

    .rank-card {
      display: flex;
      align-items: center;
      gap: 15px;
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .rank-card img {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      object-fit: cover;
    }

    .rank-num {
      font-size: 22px;
      font-weight: bold;
      width: 40px;
    }

    .score {
      margin-left: auto;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .page-wrapper { flex-direction: column; }
      .side-nav { width: 100%; }
    }
  </style>
</head>

<body>

<div class="page-wrapper">

  <div class="side-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="past-rankings.html">Past Rankings</a>
  </div>

  <div class="main-content">

    <h1>🔥 The Heat Index</h1>

    <!-- CAROUSEL -->
    <div class="carousel-container">
      <img id="carousel" src="https://raw.githubusercontent.com/Rafaelamaya85/Pro-Golf-Performance-Tracker/main/rory.png">
    </div>

    <!-- PGA -->
    <h2>PGA Top 5</h2>

    </div>

    <div class="rank-card">

    <div class="rank-card">

    <div class="rank-card">

      <img src="https://raw.githubusercontent.com/Rafaelamaya85/Pro-Golf-Performance-Tracker/main/korda_nelly_hs24_470x486.jpg">
      <div>Nelly Korda</div>
      <div class="score">12</div>
    </div>

    <div class="rank-card">
      <div class="rank-num">2</div>

      <div>Jeeno Thitikul</div>

    <div class="rank-card">

    <div class="rank-card">

    </div>

    <div class="rank-card">
      <div class="rank-num">5</div>
      <img src="https://raw.githubusercontent.com/Rafaelamaya85/Pro-Golf-Performance-Tracker/main/ryu.jpg">
      <div>Hae Ran Ryu</div>
      <div class="score">8</div>
    </div>

  </div>
</div>

<script>
const images = [
  "https://raw.githubusercontent.com/Rafaelamaya85/Pro-Golf-Performance-Tracker/main/rory.png",
  "https://raw.githubusercontent.com/Rafaelamaya85/Pro-Golf-Performance-Tracker/main/Scotty_46046.webp",
  "https://raw.githubusercontent.com/Rafaelamaya85/Pro-Golf-Performance-Tracker/main/korda_nelly_hs24_470x486.jpg"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("carousel").src = images[i];
}, 3000);
</script>

</body>
</html>
