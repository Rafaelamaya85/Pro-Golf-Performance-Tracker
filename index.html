<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Heat Index</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .side-nav {
      position: fixed;
      top: 120px;
      left: 20px;
      width: 160px;
      background-color: #222;
      padding: 15px 10px;
      border-radius: 12px;
    }

    .side-nav a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px;
      margin-bottom: 10px;
      background-color: #333;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .side-nav a:hover {
      background-color: #555;
    }

    .main-content {
      margin-left: 210px;
    }

    h1, h3 {
      text-align: center;
    }

    .filter-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

<!-- ✅ SIDE NAV -->
<div class="side-nav">
  <a href="index.html">Home</a>
  <a href="about.html">About</a> <!-- THIS IS YOUR LINK -->
  <a href="past-rankings.html">Past Rankings</a>
</div>

<div class="main-content">

  <h1>🔥 The Heat Index</h1>
  <h3>Top 5 Hottest Golfers - 2026</h3>

  <div class="filter-buttons">
    <button onclick="showSection('all')">All</button>
    <button onclick="showSection('pga')">PGA</button>
    <button onclick="showSection('lpga')">LPGA</button>
  </div>

  <!-- PGA -->
  <div id="pga-section">
    <h2>PGA Top 5</h2>
    <table>
      <tr><th>Rank</th><th>Player</th><th>Score</th></tr>
      <tr><td>1</td><td>Rory McIlroy</td><td>24</td></tr>
      <tr><td>2</td><td>Morikawa</td><td>18</td></tr>
      <tr><td>3</td><td>Scheffler</td><td>16</td></tr>
    </table>
  </div>

  <!-- LPGA -->
  <div id="lpga-section">
    <h2>LPGA Top 5</h2>
    <table>
      <tr><th>Rank</th><th>Player</th><th>Score</th></tr>
      <tr><td>1</td><td>Nelly Korda</td><td>12</td></tr>
      <tr><td>2</td><td>Jeeno</td><td>10</td></tr>
    </table>
  </div>

</div>

<script>
function showSection(section) {
  const pga = document.getElementById("pga-section");
  const lpga = document.getElementById("lpga-section");

  if (section === "all") {
    pga.style.display = "block";
    lpga.style.display = "block";
  } else if (section === "pga") {
    pga.style.display = "block";
    lpga.style.display = "none";
  } else {
    pga.style.display = "none";
    lpga.style.display = "block";
  }
}
</script>

</body>
</html>
